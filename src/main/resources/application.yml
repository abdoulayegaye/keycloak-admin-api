server:
  port: 8090

spring:
  application:
    name: keycloak-admin-api
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/master

keycloak:
  admin:
    server-url: http://localhost:9090
    realm: master
    client-id: admin-cli
    username: admin
    password: admin

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.archidemo: DEBUG
    org.keycloak: WARN
